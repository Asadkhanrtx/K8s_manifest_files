apiVersion: apps/v1
kind: Deployement
metadata:
  name: fitness-app-deployment
  namespace: asad-ns
  lables:
    app: fitness-app
spec:
  replicas: 8
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavaiblable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: fitness-app

  
  template:
    metadata:
      labels:
        app: fitness-app
    spec:
      containers:
        - name: fitness-app-container
          image: muralisocial123/fitness-app:v1.0.1
          ports:
            - containerPort: 3000