apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-app-deployment
  namespace: asad-ns
  labels:
    app: fitness-app
spec:
  replicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: fitness-app

  
  template:
    metadata:
      labels:
        app: fitness-app
    spec:
      containers:
        - name: fitness-app-container
          image: muralisocial123/fitness-app:v1.0.1
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

            
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-app-svc
spec:
  selector:
    app: fitness-app
  ports:
    - port: 3001 #It is the port on which service will be exposed on the internet.
      targetPort: 5000 #It is the port in which the application id running inside the container
      protocol: TCP
  type: NodePort # It is the default type of service. It exposes the service on a cluster-internal IP. Choosing this value makes the service only reachable from within the cluster. This is the default ServiceType. If you do not specify a type, this is what will be used.
    